<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – Shoeworld Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <style>
    body { display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--primary); }
    .admin-login { background:rgba(255,255,255,0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:40px;border-radius:var(--radius-lg);box-shadow:var(--glass-shadow);border:1px solid var(--glass-border);width:420px;max-width:90%; }
  </style>
</head>
<body>
  <div class="admin-login">
    <a href="{{ url_for('home') }}" class="logo">
      <i class="fas fa-shoe-prints logo-icon"></i>
      <span class="logo-text" style="color:var(--text);">Shoeworld <span class="logo-highlight">Password Reset</span></span>
    </a>
    <p style="text-align:center;color:var(--text-light);margin-bottom:20px;font-size:0.9rem;">
      Enter the admin email to reset your password.
    </p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash-alert flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label for="email">Admin Email</label>
        <input type="email" id="email" name="email" required placeholder="ark40652@gmail.com" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Verify Email</button>
      <p style="text-align:center;margin-top:12px;font-size:0.82rem;">
        <a href="{{ url_for('admin_login') }}" style="color:var(--accent);">← Back to Login</a>
      </p>
    </form>
  </div>
</body>
</html>
