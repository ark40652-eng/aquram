services:
  - type: web
    name: shoeworld-entebbe-baita
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: FLASK_ENV
        value: production
    healthCheckPath: /
    domains:
      - shoeworldentebbe.com
